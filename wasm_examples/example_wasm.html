<!--
  ADDITION IN THIS FORK:
  Example HTML page for demonstrating the Ghidra decompiler WASM module.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ghidra Decompiler WASM Example</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .container { display: flex; flex-direction: column; gap: 10px; max-width: 800px; }
        .input-group { border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
        pre { background: #f4f4f4; padding: 10px; border: 1px solid #ccc; overflow-x: auto; white-space: pre-wrap; }
        label { display: inline-block; width: 180px; }
        select { width: 300px; }
    </style>
</head>
<body>
    <h1>Ghidra Decompiler WASM</h1>

    <div class="container">
        <div class="input-group">
            <h3>1. Select Processor</h3>
            <label for="processorSelect">Architecture:</label>
            <select id="processorSelect">
                <option value="">-- Loading Processors --</option>
            </select><br><br>
            <label for="compilerSelect">Compiler:</label>
            <select id="compilerSelect">
                <option value="">-- Select Architecture First --</option>
            </select>
            <p><small>Processor specs are loaded directly from the server.</small></p>
        </div>

        <div class="input-group">
            <h3>2. Custom Specifications (Optional)</h3>
            <label for="slaInput">Custom .sla file:</label> <input type="file" id="slaInput"><br><br>
            <label for="pspecInput">Custom .pspec file:</label> <input type="file" id="pspecInput"><br><br>
            <label for="cspecInput">Custom .cspec file:</label> <input type="file" id="cspecInput">
        </div>

        <div class="input-group">
            <h3>3. Load Binary</h3>
            <label for="binInput">Binary file:</label> <input type="file" id="binInput"><br><br>
            <label for="baseAddr">Base Address:</label> <input type="text" id="baseAddr" value="0x0"><br><br>
            <label for="funcName">Function name/addr:</label> <input type="text" id="funcName" value="0x0">
            <p><small>Note: This example converts the binary to a simple XML image format for the bridge.</small></p>
        </div>

        <button id="decompileBtn" disabled>Run Decompiler</button>

        <h3>Output</h3>
        <pre id="output">Initializing WASM module...</pre>
    </div>

    <!-- Point to the generated WASM JS glue code -->
    <script src="../ghidra_decompiler.js"></script>
    <script src="example_wasm.js"></script>
</body>
</html>
